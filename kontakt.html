<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontaktformular</title>
</head>
<body>
    <h1>Kontaktformular</h1>
<form id="emailForm" onsubmit="sendEmail(); return false;">
  <label for="name">Name:</label><br>
  <input type="text" id="name" name="name" required><br>

  <label for="email">E-Mail:</label><br>
  <input type="email" id="email" name="email" required><br>

  <label for="message">Nachricht:</label><br>
  <textarea id="message" name="message" required></textarea><br>

  <!-- Cloudflare Turnstile Captcha -->
  <div class="cf-turnstile" data-sitekey="0x4AAAAAAAkyAbrf0eFAOy7q"></div><br>

  <input type="submit" value="Absenden">
</form>

<!-- Cloudflare Turnstile API einfügen -->
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

<script>
  function sendEmail() {
    // Eingabewerte sammeln
    const name = document.getElementById('name').value;
    const email = document.getElementById('email').value;
    const message = document.getElementById('message').value;

    // E-Mail-Inhalt formatieren
    const subject = `Neue Nachricht von ${name}`;
    const body = `Name: ${name}\nE-Mail: ${email}\nNachricht: ${message}`;

    // Mailto-URL generieren
    const mailtoLink = `mailto:dieunnuetzeseite@gmail.com?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;

    // Öffnet das Standard-Mail-Programm
    window.location.href = mailtoLink;
  }
</script>
</body>
</html>
