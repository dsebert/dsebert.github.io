<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontaktformular</title>
</head>
<body>
    <h1>Kontaktformular</h1>
    <form action="mailto:dieunnuetzeseite@gmail.com" method="GET" enctype="text/plain" onsubmit="return validateTurnstile();">
        <label for="name">Name:</label><br>
        <input type="text" id="name" name="name" required><br>

        <label for="email">E-Mail:</label><br>
        <input type="email" id="email" name="email" required><br>

        <label for="message">Nachricht:</label><br>
        <textarea id="message" name="message" required></textarea><br>

        <!-- Cloudflare Turnstile Captcha -->
        <div class="cf-turnstile" data-sitekey="DEIN_TURNSTILE_SITE_KEY"></div>
        <br>

        <input type="submit" value="Absenden">
    </form>

    <!-- Cloudflare Turnstile API einfügen -->
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

    <script>
        function validateTurnstile() {
            // Hier kannst du das Turnstile-Token validieren, bevor du das Formular abschickst.
            const turnstileToken = document.querySelector('textarea[name="cf-turnstile-response"]').value;
            if (!turnstileToken) {
                alert("Bitte bestätigen Sie, dass Sie kein Roboter sind.");
                return false;
            }
            return true;
        }
    </script>
</body>
</html>
