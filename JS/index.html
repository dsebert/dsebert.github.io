<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Content with Table</title>
</head>
<body>
    <table style="width: 100%; height: 100vh;">
        <tr>
            <td style="width: 20%; vertical-align: top;">
                <nav>
                    <ul>
                        <li><a href="#" onclick="loadContent('home.html')">Home</a></li>
                        <li><a href="#" onclick="loadContent('about.html')">About</a></li>
                        <li><a href="#" onclick="loadContent('contact.html')">Contact</a></li>
                    </ul>
                </nav>
            </td>
            <td style="width: 80%; vertical-align: top;">
                <div id="content">
                    <!-- Initial content goes here -->
                    <p>Willkommen auf meiner Website!</p>
                </div>
            </td>
        </tr>
    </table>

    <script src="script.js"></script>
</body>
</html>
