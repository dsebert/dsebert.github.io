<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verleser-Wörter</title>
    <style>
        .container {
            display: flex;
            align-items: center;
            justify-content: space-around;
            width: 100%;
            margin-top: 50px;
        }

        .word {
            font-size: 24px;
            font-weight: bold;
        }

        .flip-box {
            background-color: transparent;
            width: 150px;
            height: 100px;
            perspective: 1000px;
        }

        .flip-box-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            cursor: pointer;
        }

        .flip-box-front, .flip-box-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: white;
            border: 2px solid #333;
        }

        .flip-box-front {
            background-color: #555;
        }

        .flip-box-back {
            background-color: #4CAF50;
            transform: rotateY(180deg);
        }

        .flip-box.flip .flip-box-inner {
            transform: rotateY(180deg);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="word">Baumen-Taster</div>
    <div class="flip-box" onclick="this.classList.toggle('flip')">
        <div class="flip-box-inner">
            <div class="flip-box-front">
                Klick mich
            </div>
            <div class="flip-box-back">
                Baum-Entsafter
            </div>
        </div>
    </div>
</div>

</body>
</html>
