<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verleser-Wörter</title>
    <style>
        .container {
            display: flex;
            align-items: center;
            justify-content: space-around;
            width: 100%;
            margin-top: 50px;
        }

        .word {
            font-size: 24px;
            font-weight: bold;
        }

        .flip-box {
            background-color: transparent;
            width: 150px;
            height: 100px;
            perspective: 1000px;
        }

        .flip-box-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            cursor: pointer;
        }

        .flip-box-front, .flip-box-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: white;
            border: 2px solid #333;
        }

        .flip-box-front {
            background-color: #555;
        }

        .flip-box-back {
            background-color: #4CAF50;
            transform: rotateY(180deg);
        }

        .flip-box.flip .flip-box-inner {
            transform: rotateY(180deg);
        }
    </style>
</head>
<body>

<div class="container" id="wordList"></div>

<script>
    const words = [
        { mistaken: 'Baumen-Taster', correct: 'Baum-Entsafter' },
        { mistaken: 'Bier-Schwamm', correct: 'Bierschwam' },
        { mistaken: 'Auto-Schnauze', correct: 'Autoschnautze' }
    ];

    const wordListContainer = document.getElementById('wordList');

    words.forEach(({ mistaken, correct }) => {
        const wordContainer = document.createElement('div');
        wordContainer.className = 'word-container';

        const wordDiv = document.createElement('div');
        wordDiv.className = 'word';
        wordDiv.textContent = mistaken;

        const flipBox = document.createElement('div');
        flipBox.className = 'flip-box';
        flipBox.onclick = () => flipBox.classList.toggle('flip');

        const flipBoxInner = document.createElement('div');
        flipBoxInner.className = 'flip-box-inner';

        const front = document.createElement('div');
        front.className = 'flip-box-front';
        front.textContent = 'Klick mich';

        const back = document.createElement('div');
        back.className = 'flip-box-back';
        back.textContent = correct;

        flipBoxInner.appendChild(front);
        flipBoxInner.appendChild(back);
        flipBox.appendChild(flipBoxInner);
        wordContainer.appendChild(wordDiv);
        wordContainer.appendChild(flipBox);
        wordListContainer.appendChild(wordContainer);
    });
</script>

</body>
</html>
