<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ausreden Generator</title>
    <link rel="shortcut icon" href="home.ico" type="image/vnd.microsoft.icon">
    <link rel="stylesheet" type="text/css" href="../style.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        .container {
            text-align: center;
            padding: 20px;
            background-color: white;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
        #ausrede {
            font-size: 18px;
            margin-top: 20px;
            color: #333;
        }
    </style>

    <!-- Cloudflare Web Analytics -->
    <script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "434cdbd330004239a922a01e6f7e1238"}'></script>
    <!-- End Cloudflare Web Analytics -->
</head>
<body>
    <header>
        <nav>
            <a href="../index.html">Home</a>
            <a href="../nuetzlich/nuetzlich.html">Nützliche Dinge</a>
            <a href="../unnuetzlich/unnuetzlich.html">Unnütze Dinge</a>
            <a href="../games/games.html">Games</a>
            <a href="../impressum.html">Kontakt</a>
        </nav>
    </header>
    <div class="hero2">
        <h1>Ausreden Generator</h1>
        <p>
            Klicke auf den Button, um eine zufällige Ausrede
        </p>
    </div>
    <button onclick="generateAusrede()">Generiere Ausrede</button>
    <p id="ausrede"></p>

    <script>
        const objekte = ["der Hund", "mein Nachbar", "die Katze", "mein Computer", "das Auto", "mein Handy", "ein Einhorn", "mein Stift", "das Bett"];
        const aktionen = ["das Kabel gefressen hat", "einen Stromausfall verursacht hat", "das Internet lahmgelegt hat", "nicht mehr anspringt", "kaputtgegangen ist", "hunger hatte", "kein Strom mehr hatte"];

        function generateAusrede() {
            const objekt = objekte[Math.floor(Math.random() * objekte.length)];
            const aktion = aktionen[Math.floor(Math.random() * aktionen.length)];
            const ausrede = `Weil ${objekt} ${aktion}.`;
            document.getElementById("ausrede").textContent = ausrede;
        }
    </script>
    <!-- Hier wird der Footer geladen -->
    <div id="footer-placeholder"></div>

    <!-- JavaScript zum Laden des Footers -->
    <script>
        // Funktion zum Laden des Footers
        function loadFooter() {
            fetch('../footer.html') // Datei footer.html abrufen
            .then(response => response.text()) // Inhalt als Text lesen
            .then(data => {
                document.getElementById('footer-placeholder').innerHTML = data;
            });
        }

        // Footer laden, sobald die Seite vollständig geladen ist
        window.onload = loadFooter;
    </script>
</body>
</html>
