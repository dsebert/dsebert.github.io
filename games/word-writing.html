            let timeLeft = 30;
            let currentWord;

            const wordDisplay = document.getElementById('wordDisplay');
            const input = document.getElementById('input');
            const scoreDisplay = document.getElementById('score');
            const timerDisplay = document.getElementById('timer');
            const submitButton = document.getElementById('submit');

            function startGame() {
            timeLeft = 10;
            score = 0;
            updateScore();
            generateWord();
            startTimer();
            }

            function generateWord() {
            currentWord = words[Math.floor(Math.random() * words.length)];
            wordDisplay.textContent = currentWord;
            input.value = '';
            input.focus();
            }

            function startTimer() {
            const timer = setInterval(() => {
            timeLeft--;
            timerDisplay.textContent = `Zeit: ${timeLeft}s`;
            if (timeLeft <= 0) {
                clearInterval(timer);
                alert(`Zeit abgelaufen! Deine Punkte: ${score}`);
                startGame();
                }
                },
                1000);
                }

                submitButton.addEventListener('click', () => {
                if (input.value === currentWord) {
                score++;
                updateScore();
                generateWord();
                } else {
                alert('Falsches Wort! Versuch es noch einmal.');
                }
                });

                function updateScore() {
                scoreDisplay.textContent = `Punkte: ${score}`;
                }

                startGame();
            </script>
            <!-- Hier wird der Footer geladen -->
            <div id="footer-placeholder"></div>

            <!-- JavaScript zum Laden des Footers -->
            <script>
                // Funktion zum Laden des Footers
                function loadFooter() {
                    fetch('../footer.html') // Datei footer.html abrufen
                    .then(response => response.text()) // Inhalt als Text lesen
                    .then(data => {
                        document.getElementById('footer-placeholder').innerHTML = data;
                    });
                }

                // Footer laden, sobald die Seite vollständig geladen ist
                window.onload = loadFooter;
            </script>
