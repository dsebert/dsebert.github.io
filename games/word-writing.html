<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wörter auf Zeit Spiel</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f4;
            padding: 50px;
        }
        #game {
            margin: 0 auto;
            max-width: 400px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        #wordDisplay {
            font-size: 24px;
            margin: 20px 0;
        }
        #input {
            width: 100%;
            padding: 10px;
            font-size: 18px;
            margin-bottom: 10px;
        }
        #submit {
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
        }
        #score, #timer {
            font-size: 20px;
            margin: 10px 0;
        }
    </style>
</head>
<body>

<div id="game">
    <h1>Wörter auf Zeit</h1>
    <div id="wordDisplay">Wort erscheint hier</div>
    <input type="text" id="input" placeholder="Gib das Wort ein">
    <button id="submit">Einreichen</button>
    <div id="score">Punkte: 0</div>
    <div id="timer">Zeit: 30s</div>
</div>

<script>
    let words = [];
    let score = 0;
    let timeLeft = 30;
    let currentWord;

    const wordDisplay = document.getElementById('wordDisplay');
    const input = document.getElementById('input');
    const scoreDisplay = document.getElementById('score');
    const timerDisplay = document.getElementById('timer');
    const submitButton = document.getElementById('submit');

    function startGame() {
        timeLeft = 30;
        score = 0;
        updateScore();
        generateWord();
        startTimer();
    }

    function generateWord() {
        currentWord = words[Math.floor(Math.random() * words.length)];
        wordDisplay.textContent = currentWord;
        input.value = '';
        input.focus();
    }

    function startTimer() {
        const timer = setInterval(() => {
            timeLeft--;
            timerDisplay.textContent = `Zeit: ${timeLeft}s`;
            if (timeLeft <= 0) {
                clearInterval(timer);
                alert(`Zeit abgelaufen! Deine Punkte: ${score}`);
                startGame();
            }
        }, 1000);
    }

    submitButton.addEventListener('click', () => {
        if (input.value === currentWord) {
            score++;
            updateScore();
            generateWord();
        } else {
            alert('Falsches Wort! Versuch es noch einmal.');
        }
    });

    function updateScore() {
        scoreDisplay.textContent = `Punkte: ${score}`;
    }

    // Wörter aus der words.txt laden
    fetch('words.txt')
        .then(response => response.text())
        .then(data => {
            // Die Wörter in ein Array umwandeln
            words = data.split(',').map(word => word.trim().replace(/"/g, '')); // Anführungszeichen entfernen und trimmen
            startGame(); // Spiel starten, nachdem die Wörter geladen sind
        })
        .catch(error => {
            console.error('Fehler beim Laden der Wörter:', error);
        });
</script>

</body>
</html>
