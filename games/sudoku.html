<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudoku Spiel</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
        }

        #sudoku-container {
            display: inline-block;
            margin-top: 20px;
        }

        .grid {
            display: grid;
            margin: 0 auto;
            gap: 1px;
        }

        input {
            width: 50px;
            height: 50px;
            text-align: center;
            font-size: 20px;
            border: 1px solid black;
            box-sizing: border-box;
        }

        input:disabled {
            background-color: lightgray;
        }

        .box {
            border: 2px solid black;
            box-sizing: border-box;
        }

        /* 4x4 Sudoku Grid */
        .grid-4x4 {
            grid-template-columns: repeat(4, 50px);
            grid-template-rows: repeat(4, 50px);
        }

        .grid-4x4 .box:nth-child(2), .grid-4x4 .box:nth-child(4) {
            border-right: 2px solid black;
        }

        .grid-4x4 .box:nth-child(n+9):nth-child(-n+12) {
            border-bottom: 2px solid black;
        }

        /* 9x9 Sudoku Grid */
        .grid-9x9 {
            grid-template-columns: repeat(9, 50px);
            grid-template-rows: repeat(9, 50px);
        }

        .grid-9x9 .box:nth-child(3), .grid-9x9 .box:nth-child(6), 
        .grid-9x9 .box:nth-child(27), .grid-9x9 .box:nth-child(30), 
        .grid-9x9 .box:nth-child(33), .grid-9x9 .box:nth-child(54), 
        .grid-9x9 .box:nth-child(57), .grid-9x9 .box:nth-child(60) {
            border-right: 2px solid black;
        }

        .grid-9x9 .box:nth-child(n+19):nth-child(-n+27), 
        .grid-9x9 .box:nth-child(n+46):nth-child(-n+54) {
            border-bottom: 2px solid black;
        }

        #message {
            margin-top: 20px;
            font-size: 18px;
        }

        #new-sudoku {
            display: none;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>Sudoku Spiel</h1>
    <div>
        <label for="size">Spielfeldgröße: </label>
        <select id="size" onchange="generateSudoku()">
            <option value="4">4x4</option>
            <option value="9">9x9</option>
        </select>
    </div>
    
    <div>
        <label for="difficulty">Schwierigkeit: </label>
        <select id="difficulty" onchange="generateSudoku()">
            <option value="easy">Leicht</option>
            <option value="medium">Mittel</option>
            <option value="hard">Schwer</option>
        </select>
    </div>
    
    <div id="sudoku-container"></div>
    
    <button onclick="checkSudoku()">Überprüfen</button>
    
    <div id="message"></div>
    <button id="new-sudoku" onclick="generateSudoku()">Neues Sudoku erstellen</button>

    <script>
        let sudokuGrid = [];

        function generateSudoku() {
            const size = parseInt(document.getElementById('size').value);
            const difficulty = document.getElementById('difficulty').value;
            const sudokuContainer = document.getElementById('sudoku-container');
            const message = document.getElementById('message');
            const newSudokuButton = document.getElementById('new-sudoku');
            
            sudokuContainer.innerHTML = '';
            message.innerHTML = '';
            newSudokuButton.style.display = 'none';

            let gridClass = (size === 4) ? 'grid-4x4' : 'grid-9x9';
            sudokuGrid = generateValidSudoku(size); // Generiert ein valides Sudoku
            
            const grid = document.createElement('div');
            grid.classList.add('grid', gridClass);
            
            let presetCount = getPresetCount(size, difficulty);
            fillSudoku(grid, size, presetCount);
            
            sudokuContainer.appendChild(grid);
        }

        // Funktion, um ein zufälliges, aber gültiges Sudoku zu erzeugen
        function generateValidSudoku(size) {
            let grid = [];
            for (let i = 0; i < size; i++) {
                grid.push(Array(size).fill(null));
            }

            // Ein einfaches vollständiges Sudoku-Raster erstellen (Placeholder)
            if (size === 4) {
                grid = [
                    [1, 2, 3, 4],
                    [3, 4, 1, 2],
                    [2, 1, 4, 3],
                    [4, 3, 2, 1]
                ];
            } else if (size === 9) {
                grid = [
                    [5, 3, 4, 6, 7, 8, 9, 1, 2],
                    [6, 7, 2, 1, 9, 5, 3, 4, 8],
                    [1, 9, 8, 3, 4, 2, 5, 6, 7],
                    [8, 5, 9, 7, 6, 1, 4, 2, 3],
                    [4, 2, 6, 8, 5, 3, 7, 9, 1],
                    [7, 1, 3, 9, 2, 4, 8, 5, 6],
                    [9, 6, 1, 5, 3, 7, 2, 8, 4],
                    [2, 8, 7, 4, 1, 9, 6, 3, 5],
                    [3, 4, 5, 2, 8, 6, 1, 7, 9]
                ];
            }

            // Zufällige Vertauschung von Reihen und Spalten im gleichen Block, um Varianz zu erzeugen
            for (let i = 0; i < size; i += Math.sqrt(size)) {
                shuffle(grid.slice(i, i + Math.sqrt(size)));
            }

            return grid;
        }

        // Funktion zum zufälligen Mischen eines Arrays (Fisher-Yates)
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function fillSudoku(gridElement, size, presetCount) {
            let filledCells = 0;
            let grid = sudokuGrid;
            for (let row = 0; row < size; row++) {
                for (let col = 0; col < size; col++) {
                    const input = document.createElement('input');
                    input.type = 'text';
                    input.maxLength = '1';
                    input.classList.add('box');
                    
                    if (filledCells < presetCount && Math.random() > 0.5) {
                        input.value = grid[row][col];
                        input.disabled = true;
                        filledCells++;
                    } else {
                        input.value = '';
                    }
                    
                    gridElement.appendChild(input);
                }
            }
        }

        function getPresetCount(size, difficulty) {
            switch (difficulty) {
                case 'easy':
                    return (size === 4) ? 8 : 36;
                case 'medium':
                    return (size === 4) ? 6 : 28;
                case 'hard':
                    return (size === 4) ? 4 : 22;
            }
        }

        function checkSudoku() {
            const size = parseInt(document.getElementById('size').value);
            const inputs = document.querySelectorAll('#sudoku-container input');
            const message = document.getElementById('message');
            const newSudokuButton = document.getElementById('new-sudoku');
            let isCorrect = true;

            inputs.forEach((input, index) => {
                const row = Math.floor(index / size);
                const col = index % size;
                const userValue = input.value.trim();

                if (userValue === '') {
                    isCorrect = false;
                } else if (parseInt(userValue) !== sudokuGrid[row][col]) {
                    isCorrect = false;
                }
            });

            if (isCorrect) {
                message.innerHTML = 'Sudoku korrekt gelöst!';
                newSudokuButton.style.display = 'inline';
            } else {
                message.innerHTML = 'Es gibt Fehler im Sudoku oder es sind noch Felder leer.';
                newSudokuButton.style.display = 'none';
            }
        }

        generateSudoku(); // Startet das erste Sudoku bei Seitenaufruf
    </script>
</body>
</html>
